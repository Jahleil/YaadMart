<!DOCTYPE html>
<html>
<head>
      <title>My Cart | YaadMart</title>
       <link rel="stylesheet" href="../styles.css">

<style>
   body
   {
    font-family: Arial;
    padding: 20px;
    background-color: #f4f9f4;
    margin: 0;
    text-align: center;
   }
  
   header h1
   { 
    color: #ffcc00;
    margin: 0;
   }

   .cart-section
   {
    display: flex;
    gap: 30px;
    margin-to: 20px;
   }

   .items-box
   {
    flex: 2;
    border: 2px solid black;
    padding: 15px;
   }

   .summary-box
   {
    flex: 1;
    border: 2px solid black;
    padding: 15px;
    height: fit-content;
   } 

   .cart-item
   {
    border: 2px solid gray;
    padding: 15px 0;
    dispay: flex;
    justify-content: space-between;
   }

   button
   {
    padding: 5px 10px;
    cursor: pointer;
   }

   h2
   {
    margin-top: 0;
   }

</style>
</head>


<body>

<header>
     </br></br><h1>Shopping chart</h1>
</header>

<div class="cart-section">

   <div class="items-box">
      <h2>Selected Items</h2>
      <div id="cartList"></div>
   </div>

   <div class="summary-box">
      <h2>Payment Summary</h2>
      <p id="totalItems">Items: 0</p>
      <p id="serviceFee">Service Fee: 0</p>
      <p id="totalPrice">Total: $0</p>

       <button onclick="clearCart()">Clear Cart</button>
       <button onclick="goToCheckout()">Checkout</button>  
   </div>
       

</div>

</br>
<a href="products.html"> Continue Shopping</a>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function displayCart() {
   let list = document.getElementById("cartList");
  
   let total = 0;
   let count = cart.length;

   list.innerHTML = "";

   cart.forEach((item, index) => {
      total += item.price;
     
      list.innerHTML += `
      <div class="cart-item">
         <span>${item.name} - $${item.price}</span>
         <button onclick="removeItem(${index})">Remove</button>
      </div>
      `;
});

let serviceFee = total * 0.10;
let finalTotal = total + serviceFee;

    document.getElementById("serviceFee").innerText = "Service Fee (10%): $" + serviceFee.toFixed(2); 
    document.getElementById("totalPrice").innerText ="Total: $" + finalTotal.toFixed(2); 
    document.getElementById("totalItems").innerText = "Items: " + count;
}

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  displayCart();
}

function clearCart() {
  cart = [];
  localStorage.removeItem("cart");
  displayCart();
}

function goToCheckout() {
window.location.href="Checkout.html";
}

window.onload = displayCart;

</script>

</body>
</html>
