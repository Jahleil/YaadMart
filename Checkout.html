<!DOCTYPE html>
<html>
<head>
    <title>Checkout | YaadMart</title>


<style>
   body 
   {
    font-family: Arial;
    padding: 20px;
    background-color: #f4f9f4;
    text-align: center;
    margin: 0;
   }
  
   header
   {
    background-color: #009b3a;
    padding: 20px;
   }

   header h1
   {
    color: #ffcc00;
    margin: 0;
   }

   .checkout-section 
   {
    display: flex;
    gap: 30px;
    justify-content: center;
    margin-top: 20px;
   }

   .cart-summary 
   {
    border: 2px solid black;
    padding: 15px;
    flex: 1;
    background-color: #fffffff;
    border-radius: 10px;
    text-align: left;
   }

   .shipping-form 
   {
    border: 2px solid black;
    padding: 15px;
    flex: 1;
    background-color: #fffffff;
    border-radius: 10px;
    text-align: left;
   }

   .cart-item 
   {
    border: 1px solid gray;
    padding: 10px 0;
    display: flex;
    justify-content: space-between;
   }

   button
   {
    padding: 5px 10px;
    margin: 5px 0;
    cursor: pointer;
   }

   h2 
   {
    margin-top: 0;
   }

   input, textarea 
   {
    width: 100%;
    padding: 5px;
    margin: 5px 0 10px 0;
    }

   .products button
   {
    mardin: 5px;
    background-color: #ffcc00;
    border: none;
    padding: 8px 15px;
    color: black;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
   }

</style>

</head>
<body>

<header>
    <h1>Checkout</h1>
</header>

<div class="checkout-section">

    <div class="cart-summary">
        <h2>Cart Summary</h2>
        <div id="cartList"></div>
        <p id="totalItems">Items: 0</p>
        <p id="serviceFee">Service Fee: $0</p>
        <p id="totalPrice">Total: $0</p>
        <button onclick="clearCart()">Clear All</button>
        <button onclick="window.location.href='products.html'">Continue Shopping</button>
        <button onclick="closeCheckout()">Close</button>
    </div>

  
    <div class="shipping-form">
        <h2>Shipping Details</h2>
        <label for="name">Full Name:</label>
        <input type="text" id="name" placeholder="Your Name">

        <label for="address">Address:</label>
        <textarea id="address" rows="3" placeholder="Street, Town, Parish"></textarea>

        <label for="amount">Amount Being Paid:</label>
        <input type="number" id="amount" placeholder="Enter amount">

        <button onclick="confirmOrder()">Confirm</button>
        <button onclick="cancelOrder()">Cancel</button>
    </div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function displayCart() {
    let list = document.getElementById("cartList");
    list.innerHTML = "";
    let total = 0;
    cart.forEach((item, index) => {
        total += item.price;
        list.innerHTML += `
        <div class="cart-item">
            <span>${item.name} - $${item.price}</span>
            <button onclick="removeItem(${index})">Remove</button>
        </div>
        `;
    });

    let serviceFee = total * 0.10;
    let finalTotal = total + serviceFee;

    document.getElementById("serviceFee").innerText = "Service Fee (10%): $" + serviceFee.toFixed(2);
    document.getElementById("totalPrice").innerText = "Total: $" + finalTotal.toFixed(2);
    document.getElementById("totalItems").innerText = "Items: " + cart.length;
}


function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}


function clearCart() {
    cart = [];
    localStorage.removeItem("cart");
    displayCart();
}


function confirmOrder() {
    const name = document.getElementById("name").value.trim();
    const address = document.getElementById("address").value.trim();
    const amount = parseFloat(document.getElementById("amount").value);

    let total = cart.reduce((sum, item) => sum + item.price, 0);
    let serviceFee = total * 0.10;
    let finalTotal = total + serviceFee;

    if (!name || !address || isNaN(amount)) {
        alert("Please fill in all shipping details and amount.");
        return;
    }

    if (amount < finalTotal) {
        alert(`Insufficient amount. Total to pay is $${finalTotal.toFixed(2)}`);
        return;
    }

    alert("Order confirmed! Thank you for shopping with YaadMart.");
    clearCart();
    window.location.href = "products.html";}


function cancelOrder() {
    if (confirm("Are you sure you want to cancel the order?")) {
        window.location.href = "products.html";
    }
}

function closeCheckout() {
    window.location.href = "products.html";
}

window.onload = displayCart;
</script>

</body>
</html>
